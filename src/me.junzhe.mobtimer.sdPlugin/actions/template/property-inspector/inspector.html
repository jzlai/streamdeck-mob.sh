<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui,viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <title>me.junzhe.mobtimer Property Inspector</title>
    <link rel="stylesheet" href="../../../libs/css/sdpi.css" />
  </head>

  <body>
    <div class="sdpi-wrapper">
      <form id="property-inspector">
        <div class="sdpi-item">
          <div data-localize class="sdpi-item-label">Host</div>
          <input
            data-localize
            class="sdpi-item-value"
            name="host"
            type="text"
            value="https://timer.mob.sh"
          />
        </div>

        <div class="sdpi-item">
          <div data-localize class="sdpi-item-label">Room</div>
          <input
            data-localize
            class="sdpi-item-value"
            name="room"
            type="text"
            value=""
          />
        </div>

        <div class="sdpi-item">
          <div data-localize class="sdpi-item-label">Name</div>
          <input
            data-localize
            class="sdpi-item-value"
            name="name"
            type="text"
            value=""
          />
        </div>

        <div class="sdpi-item">
          <div data-localize class="sdpi-item-label">Duration in min</div>
          <input
            data-localize
            class="sdpi-item-value"
            name="timer"
            type="number"
            value="10"
          />
        </div>
      </form>
    </div>

    <!-- Stream Deck Libs -->
    <script src="../../../libs/js/constants.js"></script>
    <script src="../../../libs/js/prototypes.js"></script>
    <script src="../../../libs/js/timers.js"></script>
    <script src="../../../libs/js/utils.js"></script>
    <script src="../../../libs/js/events.js"></script>
    <script src="../../../libs/js/api.js"></script>
    <script src="../../../libs/js/property-inspector.js"></script>
    <script src="../../../libs/js/dynamic-styles.js"></script>

    <!-- Property Inspector Source -->
    <script src="inspector.js"></script>
  </body>
</html>
